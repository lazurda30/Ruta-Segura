<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario Safe Route</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:#111827;
padding:30px;
border-radius:15px;
}

button{
margin:10px;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.option{
background:#1e293b;
color:white;
display:block;
width:100%;
}

.option:hover{
background:#facc15;
color:black;
}

</style>
</head>

<body>

<div class="container">

<h1>📝 Cuestionario de Tránsito</h1>

<h2 id="question"></h2>

<div id="options"></div>

<h3 id="result"></h3>

<a href="Ruta Segura.html">⬅ Volver</a>

</div>

<script>

const quiz = [
{
question:"¿Qué significa la luz roja del semáforo?",
options:["Avanzar","Detenerse","Ir rápido"],
answer:1
},
{
question:"¿Quién tiene prioridad en un cruce?",
options:["Peatón","Vehículo rápido","Nadie"],
answer:0
},
{
question:"¿Para qué sirve el cinturón?",
options:["Decoración","Seguridad","Velocidad"],
answer:1
}
];

let index=0;
let score=0;

function loadQuestion(){

document.getElementById("result").innerHTML="";

const q=quiz[index];
document.getElementById("question").innerText=q.question;

const optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

q.options.forEach((opt,i)=>{
const btn=document.createElement("button");
btn.innerText=opt;
btn.className="option";
btn.onclick=()=>checkAnswer(i);
optionsDiv.appendChild(btn);
});

}

function checkAnswer(i){

if(i===quiz[index].answer){
score++;
document.getElementById("result").innerHTML="✅ Correcto";
}else{
document.getElementById("result").innerHTML="❌ Incorrecto";
}

index++;

setTimeout(()=>{
if(index<quiz.length){
loadQuestion();
}else{
document.getElementById("question").innerText="Finalizado";
document.getElementById("options").innerHTML="";
document.getElementById("result").innerHTML=
"Puntuación: "+score+" / "+quiz.length;
}
},1000);

}

loadQuestion();

</script>

</body>
</html>
