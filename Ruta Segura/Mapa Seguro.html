!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Safe Route Navigator PRO</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
}

#map{
height:100vh;
width:100%;
}

/* BARRA SUPERIOR */
.topbar{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(17,24,39,.95);
padding:12px;
border-radius:50px;
display:flex;
gap:8px;
z-index:999;
box-shadow:0 0 25px rgba(0,0,0,.7);
}

input{
padding:10px;
border-radius:20px;
border:none;
width:230px;
}

/* BOTONES */
.btn{
background:#facc15;
border:none;
padding:10px 14px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
font-size:13px;
}

/* PANEL DIRECCIONES */
.panel{
position:absolute;
right:0;
top:0;
width:340px;
height:100%;
background:#111827;
color:white;
overflow:auto;
padding:20px;
}

.summary{
background:#facc15;
color:black;
padding:10px;
border-radius:10px;
margin-bottom:15px;
font-weight:bold;
}

.step{
background:#1e293b;
padding:10px;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="topbar">

<button class="btn" onclick="volver()">⬅ Inicio</button>

<input id="search" placeholder="Buscar destino">

<button class="btn" onclick="miUbicacion()">📍 Ubicación</button>

<button class="btn" onclick="crearRuta()">🧭 Navegar</button>

<button class="btn" onclick="toggleTraffic()">🚦 Tráfico</button>

<button class="btn" onclick="toggleSatellite()">🛰 Satélite</button>

<button class="btn" onclick="guardarFavorito()">❤️ Guardar</button>

</div>

<div id="map"></div>

<div class="panel">
<h2>🧭 Navegación</h2>
<div id="info"></div>
<div id="steps"></div>

<h3>⭐ Favoritos</h3>
<div id="favoritos"></div>
</div>

<script>

let map, marker;
let trafficLayer;
let directionsService,directionsRenderer;
let favoritos=[];

/* INICIALIZAR MAPA */
function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:18.7357,lng:-70.1627},
zoom:13,
mapTypeControl:false
});

trafficLayer=new google.maps.TrafficLayer();

directionsService=new google.maps.DirectionsService();
directionsRenderer=new google.maps.DirectionsRenderer({map:map});

const autocomplete=
new google.maps.places.Autocomplete(
document.getElementById("search")
);

autocomplete.addListener("place_changed",()=>{

const place=autocomplete.getPlace();

if(marker)marker.setMap(null);

marker=new google.maps.Marker({
position:place.geometry.location,
map:map
});

map.setCenter(place.geometry.location);
map.setZoom(16);

});

}

/* UBICACION */
function miUbicacion(){
navigator.geolocation.getCurrentPosition(pos=>{
const loc={
lat:pos.coords.latitude,
lng:pos.coords.longitude
};
map.setCenter(loc);
});
}

/* CREAR RUTA */
function crearRuta(){

navigator.geolocation.getCurrentPosition(pos=>{

const origen={
lat:pos.coords.latitude,
lng:pos.coords.longitude
};

const destino=marker.getPosition();

directionsService.route({
origin:origen,
destination:destino,
travelMode:"DRIVING"
},(res,status)=>{

if(status==="OK"){

directionsRenderer.setDirections(res);

const leg=res.routes[0].legs[0];

document.getElementById("info").innerHTML=
`<div class="summary">
Distancia: ${leg.distance.text}<br>
Tiempo estimado: ${leg.duration.text}
</div>`;

let pasos="";

leg.steps.forEach(step=>{

hablar(step.instructions);

pasos+=`
<div class="step">
${step.instructions}
<br><small>${step.distance.text}</small>
</div>`;
});

document.getElementById("steps").innerHTML=pasos;

}

});

});
}



/* TRAFICO */
function toggleTraffic(){
trafficLayer.getMap()?trafficLayer.setMap(null):trafficLayer.setMap(map);
}

/* SATELITE */
function toggleSatellite(){
map.setMapTypeId(
map.getMapTypeId()==="roadmap"
?"satellite":"roadmap"
);
}

/* FAVORITOS */
function guardarFavorito(){

if(!marker)return;

favoritos.push(marker.getPosition().toString());

let html="";
favoritos.forEach(f=>{
html+=`<div class="step">${f}</div>`;
});

document.getElementById("favoritos").innerHTML=html;
}

/* VOLVER */
function volver(){
window.location.href="Ruta Segura.html";
}

/* MODO OSCURO AUTOMATICO */
if(window.matchMedia('(prefers-color-scheme: dark)').matches){
document.body.style.background="#000";
}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB9n197tbj6oMaAbfp7s8bGESqpSq0goAk&libraries=places&callback=initMap">
</script>

</body>
</html>
